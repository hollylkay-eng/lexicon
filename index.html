<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lexicon — Daily Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --parchment: #f5efe3;
    --gold: #c8973a;
    --gold-light: #e8c97a;
    --rust: #9b4428;
    --sage: #5a7260;
    --muted: #8a7d6a;
    --rule: #d4c9b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--ink);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  .app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: var(--parchment);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
    overflow-y: visible;
  }

  /* Decorative top edge */
  .app::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust));
  }

  /* Header */
  .header {
    padding: 52px 28px 20px;
    text-align: center;
    position: relative;
  }

  .masthead {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .logo em {
    font-style: italic;
    color: var(--rust);
  }

  .date-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }

  .date-rule .line {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .date-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Streak */
  .streak-bar {
    margin: 0 28px 0;
    background: var(--ink);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.1s;
  }

  .streak-flame {
    font-size: 22px;
    line-height: 1;
  }

  .streak-info {
    flex: 1;
  }

  .streak-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .streak-label {
    font-size: 11px;
    color: #8a7a66;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .streak-dots {
    display: flex;
    gap: 5px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3a2e22;
    transition: background 0.3s;
  }

  .dot.filled {
    background: var(--gold);
  }

  /* Main card */
  .card-section {
    padding: 20px 28px 0;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.2s;
  }

  .word-card {
    background: white;
    border-radius: 20px;
    padding: 32px 28px 28px;
    border: 1px solid var(--rule);
    box-shadow: 0 8px 40px rgba(26,18,9,0.08);
    position: relative;
    overflow: hidden;
  }

  .word-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
  }

  .word-number {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .word-main {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .word-pronunciation {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }

  .pos-badge {
    display: inline-block;
    background: var(--ink);
    color: var(--parchment);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 20px;
  }

  .divider {
    height: 1px;
    background: var(--rule);
    margin-bottom: 20px;
  }

  .definition-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .definition-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--ink);
    line-height: 1.55;
    margin-bottom: 20px;
  }

  .example-block {
    background: var(--parchment);
    border-left: 3px solid var(--gold);
    padding: 14px 16px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 20px;
  }

  .example-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .example-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: #4a3e2e;
    line-height: 1.6;
  }

  .origin-block {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .origin-icon {
    font-size: 16px;
    margin-top: 1px;
  }

  .origin-content {}

  .origin-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 3px;
  }

  .origin-text {
    font-size: 13px;
    color: #6a5a48;
    line-height: 1.5;
  }

  /* Synonyms */
  .synonyms-section {
    padding: 20px 28px 0;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.3s;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .synonym-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    background: white;
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 6px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 6px rgba(26,18,9,0.05);
  }

  .chip:active {
    background: var(--ink);
    color: var(--parchment);
    transform: scale(0.97);
  }

  /* Actions */
  .actions {
    padding: 20px 28px;
    display: flex;
    gap: 12px;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.4s;
  }

  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .btn-icon {
    font-size: 22px;
    line-height: 1;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--gold);
    box-shadow: 0 4px 16px rgba(26,18,9,0.2);
  }

  .btn-primary:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(26,18,9,0.2);
  }

  .btn-secondary {
    background: white;
    color: var(--ink);
    border: 1px solid var(--rule);
    box-shadow: 0 4px 16px rgba(26,18,9,0.05);
  }

  .btn-secondary:active {
    transform: scale(0.97);
    background: var(--parchment);
  }

  .btn-saved {
    background: var(--sage) !important;
    color: white !important;
  }

  /* Saved words */
  .saved-section {
    padding: 0 28px 40px;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.5s;
  }

  .saved-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .saved-toggle {
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--rust);
    cursor: pointer;
    text-transform: uppercase;
  }

  .saved-list {
    display: none;
    flex-direction: column;
    gap: 8px;
  }

  .saved-list.open {
    display: flex;
  }

  .saved-item {
    background: white;
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
  }

  .saved-word {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--ink);
    flex: 1;
  }

  .saved-def {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 180px;
  }

  .saved-remove {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    line-height: 1;
  }

  .empty-saved {
    text-align: center;
    padding: 20px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--muted);
  }

  /* Quiz modal */
  .quiz-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,18,9,0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .quiz-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  .quiz-sheet {
    width: 100%;
    max-width: 430px;
    background: var(--parchment);
    border-radius: 24px 24px 0 0;
    padding: 32px 28px 50px;
    animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .quiz-handle {
    width: 40px;
    height: 4px;
    background: var(--rule);
    border-radius: 2px;
    margin: 0 auto 24px;
  }

  .quiz-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .quiz-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .quiz-question {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 20px;
    padding: 18px;
    background: white;
    border-radius: 14px;
    border: 1px solid var(--rule);
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .quiz-option {
    background: white;
    border: 2px solid var(--rule);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .quiz-option:active { transform: scale(0.98); }
  .quiz-option.correct { border-color: var(--sage); background: #eef4f0; color: var(--sage); }
  .quiz-option.wrong { border-color: var(--rust); background: #fdf0ec; color: var(--rust); }

  .quiz-result {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    padding: 16px;
    border-radius: 12px;
    display: none;
  }

  .quiz-result.show { display: block; }
  .quiz-result.correct { background: #eef4f0; color: var(--sage); }
  .quiz-result.wrong { background: #fdf0ec; color: var(--rust); }

  .quiz-close {
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: var(--gold);
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    margin-top: 16px;
    letter-spacing: 0.05em;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  @keyframes flip {
    0% { transform: rotateY(0); }
    50% { transform: rotateY(90deg); }
    100% { transform: rotateY(0); }
  }

  .flipping {
    animation: flip 0.5s ease;
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <div class="masthead">Your Daily</div>
    <div class="logo">Le<em>x</em>icon</div>
    <div class="date-rule">
      <div class="line"></div>
      <div class="date-text" id="dateText">—</div>
      <div class="line"></div>
    </div>
  </div>

  <!-- Streak -->
  <div class="streak-bar">
    <div class="streak-flame">🔥</div>
    <div class="streak-info">
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-label">DAY STREAK</div>
    </div>
    <div class="streak-dots" id="streakDots"></div>
  </div>

  <!-- Word Card -->
  <div class="card-section">
    <div class="word-card" id="wordCard">
      <div class="word-number" id="wordNumber">WORD #001</div>
      <div class="word-main" id="wordMain">—</div>
      <div class="word-pronunciation" id="wordPron">—</div>
      <div class="pos-badge" id="posBadge">—</div>
      <div class="divider"></div>
      <div class="definition-label">DEFINITION</div>
      <div class="definition-text" id="wordDef">Loading your word for today…</div>
      <div class="example-block">
        <div class="example-label">Used in a sentence</div>
        <div class="example-text" id="wordEx">—</div>
      </div>
      <div class="origin-block">
        <div class="origin-icon">🏛️</div>
        <div class="origin-content">
          <div class="origin-label">Etymology</div>
          <div class="origin-text" id="wordOrigin">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Synonyms -->
  <div class="synonyms-section">
    <div class="section-title">Synonyms & Related</div>
    <div class="synonym-chips" id="synonymChips"></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="saveBtn" onclick="toggleSave()">
      <span class="btn-icon">🔖</span>
      Save Word
    </button>
    <button class="btn btn-secondary" onclick="openQuiz()">
      <span class="btn-icon">✏️</span>
      Quiz Me
    </button>
    <button class="btn btn-secondary" onclick="nextWord()">
      <span class="btn-icon">↻</span>
      New Word
    </button>
  </div>

  <!-- Saved Words -->
  <div class="saved-section">
    <div class="saved-header">
      <div class="section-title" style="margin:0">SAVED WORDS (<span id="savedCount">0</span>)</div>
      <button class="saved-toggle" onclick="toggleSavedList()">VIEW ALL</button>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>

</div>

<!-- Quiz Modal -->
<div class="quiz-overlay" id="quizOverlay" onclick="closeQuizOnBackdrop(event)">
  <div class="quiz-sheet">
    <div class="quiz-handle"></div>
    <div class="quiz-title">Quick Quiz</div>
    <div class="quiz-subtitle">Test your knowledge of today's word</div>
    <div class="quiz-question" id="quizQuestion">—</div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-result" id="quizResult"></div>
    <button class="quiz-close" onclick="closeQuiz()">Done</button>
  </div>
</div>

    definition: "An involuntary state of intense romantic infatuation characterized by obsessive thoughts about another person and a powerful desire for reciprocation.",
    example: "He recognized the signs of limerence — the constant replaying of conversations, the racing heart, the inability to focus on anything else.",
    origin: "Coined by psychologist Dorothy Tennov in 1979 in her book Love and Limerence. Origin of the specific term is personal invention.",
    synonyms: ["Infatuation", "Obsession", "Ardor", "Passion", "Fixation"]
  },
  {
    word: "Luminous",
    pronunciation: "/ˈluː·mɪ·nəs/",
    pos: "adjective",
    definition: "Emitting light, especially shining by reflected light; full of light, bright and radiant — also used to describe something intellectually or spiritually enlightening.",
    example: "Her luminous eyes seemed to capture and reflect every light in the room, holding entire conversations without a single word.",
    origin: "From Latin luminosus, from lumen (light). Related to luna (moon) and illuminate. Proto-Indo-European root leuk- (to shine).",
    synonyms: ["Radiant", "Incandescent", "Lustrous", "Brilliant", "Resplendent"]
  },
  {
    word: "Vellichor",
    pronunciation: "/ˈvel·ɪ·kɔːr/",
    pos: "noun",
    definition: "The strange wistfulness of used bookstores, which are somehow both cozy and melancholy — filled with thousands of stories that will never be read.",
    example: "She felt a familiar vellichor as she wandered the cramped aisles, running her fingers along spines no one else had touched in years.",
    origin: "Coined by John Koenig in The Dictionary of Obscure Sorrows. Modeled on words like 'velvet' and 'ichor,' evoking softness and age.",
    synonyms: ["Melancholy", "Wistfulness", "Nostalgia", "Longing", "Bittersweetness"]
  }
];

// Decoy definitions for quiz
const decoys = [
  "The tendency to assign human emotions to inanimate objects",
  "A brief but intense burst of creative inspiration",
  "The quiet that settles after a loud sound",
  "A recurring dream of familiar but unknown places",
  "The sensation of time moving differently than expected",
  "An overwhelming desire to explore unknown places",
  "The melancholy felt at the end of a long journey",
  "A word that sounds exactly like its meaning",
  "The pleasure derived from solitary activities"
];

let currentWordIndex = 0;
let savedWords = JSON.parse(localStorage.getItem('lexicon_saved') || '[]');
let streak = parseInt(localStorage.getItem('lexicon_streak') || '0');
let lastVisit = localStorage.getItem('lexicon_lastVisit') || '';
let savedListOpen = false;

function init() {
  // Update date
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateText').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

  // Update streak
  const today = now.toDateString();
  if (lastVisit !== today) {
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    if (lastVisit === yesterday.toDateString()) {
      streak++;
    } else if (lastVisit !== today) {
      streak = 1;
    }
    localStorage.setItem('lexicon_streak', streak);
    localStorage.setItem('lexicon_lastVisit', today);
  }

  // Use day-of-year to pick daily word
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const dayOfYear = Math.floor(diff / (1000*60*60*24));
  currentWordIndex = dayOfYear % words.length;

  renderStreak();
  renderWord(currentWordIndex);
  renderSavedWords();
}

function renderStreak() {
  document.getElementById('streakNum').textContent = streak;
  const dots = document.getElementById('streakDots');
  dots.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < Math.min(streak, 7) ? ' filled' : '');
    dots.appendChild(d);
  }
}

function renderWord(idx) {
  const w = words[idx];
  document.getElementById('wordNumber').textContent = `WORD #${String(idx+1).padStart(3,'0')}`;
  document.getElementById('wordMain').textContent = w.word;
  document.getElementById('wordPron').textContent = w.pronunciation;
  document.getElementById('posBadge').textContent = w.pos;
  document.getElementById('wordDef').textContent = w.definition;
  document.getElementById('wordEx').textContent = w.example;
  document.getElementById('wordOrigin').textContent = w.origin;

  const chips = document.getElementById('synonymChips');
  chips.innerHTML = '';
  w.synonyms.forEach(s => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = s;
    chips.appendChild(chip);
  });

  // Update save button
  const isSaved = savedWords.some(sw => sw.word === w.word);
  const btn = document.getElementById('saveBtn');
  btn.className = 'btn btn-primary' + (isSaved ? ' btn-saved' : '');
  btn.innerHTML = `<span class="btn-icon">${isSaved ? '✓' : '🔖'}</span>${isSaved ? 'Saved!' : 'Save Word'}`;
}

function nextWord() {
  const card = document.getElementById('wordCard');
  card.classList.add('flipping');
  setTimeout(() => {
    currentWordIndex = (currentWordIndex + 1) % words.length;
    renderWord(currentWordIndex);
    card.classList.remove('flipping');
  }, 250);
}

function toggleSave() {
  const w = words[currentWordIndex];
  const idx = savedWords.findIndex(sw => sw.word === w.word);
  if (idx === -1) {
    savedWords.push({ word: w.word, definition: w.definition.substring(0, 50) + '…' });
  } else {
    savedWords.splice(idx, 1);
  }
  localStorage.setItem('lexicon_saved', JSON.stringify(savedWords));
  renderWord(currentWordIndex);
  renderSavedWords();
}

function renderSavedWords() {
  document.getElementById('savedCount').textContent = savedWords.length;
  const list = document.getElementById('savedList');
  if (savedWords.length === 0) {
    list.innerHTML = '<div class="empty-saved">No words saved yet — start building your collection.</div>';
    return;
  }
  list.innerHTML = '';
  savedWords.forEach((sw, i) => {
    const item = document.createElement('div');
    item.className = 'saved-item';
    item.style.animationDelay = `${i * 0.05}s`;
    item.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="saved-word">${sw.word}</div>
        <div class="saved-def">${sw.definition}</div>
      </div>
      <button class="saved-remove" onclick="removeSaved(${i})">×</button>
    `;
    list.appendChild(item);
  });
}

function removeSaved(i) {
  savedWords.splice(i, 1);
  localStorage.setItem('lexicon_saved', JSON.stringify(savedWords));
  renderSavedWords();
  renderWord(currentWordIndex);
}

function toggleSavedList() {
  savedListOpen = !savedListOpen;
  document.getElementById('savedList').classList.toggle('open', savedListOpen);
  document.querySelector('.saved-toggle').textContent = savedListOpen ? 'HIDE' : 'VIEW ALL';
}

function openQuiz() {
  const w = words[currentWordIndex];
  // Build question
  document.getElementById('quizQuestion').textContent = `What does "${w.word}" mean?`;

  // Build options: correct + 3 random decoys
  const correct = w.definition.split(';')[0].split('—')[0].trim();
  const shuffled = [...decoys].sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [...shuffled, correct].sort(() => Math.random() - 0.5);

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt, correct, btn);
    container.appendChild(btn);
  });

  document.getElementById('quizResult').className = 'quiz-result';
  document.getElementById('quizOverlay').classList.add('open');
}

function checkAnswer(chosen, correct, btn) {
  const allBtns = document.querySelectorAll('.quiz-option');
  allBtns.forEach(b => {
    b.onclick = null;
    if (b.textContent === correct) b.classList.add('correct');
    else if (b === btn && chosen !== correct) b.classList.add('wrong');
  });

  const result = document.getElementById('quizResult');
  result.classList.add('show');
  if (chosen === correct) {
    result.textContent = '✓ Correct! Excellent work.';
    result.className = 'quiz-result show correct';
  } else {
    result.textContent = '✗ Not quite — review the definition above.';
    result.className = 'quiz-result show wrong';
  }
}

function closeQuiz() {
  document.getElementById('quizOverlay').classList.remove('open');
}

function closeQuizOnBackdrop(e) {
  if (e.target === document.getElementById('quizOverlay')) closeQuiz();
}

init();
</script>
</body>
</html>
