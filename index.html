<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lexicon — Daily Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --parchment: #f5efe3;
    --gold: #c8973a;
    --gold-light: #e8c97a;
    --rust: #9b4428;
    --sage: #5a7260;
    --muted: #8a7d6a;
    --rule: #d4c9b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--ink);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  .app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: var(--parchment);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
    overflow-y: visible;
  }

  /* Decorative top edge */
  .app::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust));
  }

  /* Header */
  .header {
    padding: 52px 28px 20px;
    text-align: center;
    position: relative;
  }

  .masthead {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .logo em {
    font-style: italic;
    color: var(--rust);
  }

  .date-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }

  .date-rule .line {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .date-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Streak */
  .streak-bar {
    margin: 0 28px 0;
    background: var(--ink);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.1s;
  }

  .streak-flame {
    font-size: 22px;
    line-height: 1;
  }

  .streak-info {
    flex: 1;
  }

  .streak-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .streak-label {
    font-size: 11px;
    color: #8a7a66;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .streak-dots {
    display: flex;
    gap: 5px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3a2e22;
    transition: background 0.3s;
  }

  .dot.filled {
    background: var(--gold);
  }

  /* Main card */
  .card-section {
    padding: 20px 28px 0;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.2s;
  }

  .word-card {
    background: white;
    border-radius: 20px;
    padding: 32px 28px 28px;
    border: 1px solid var(--rule);
    box-shadow: 0 8px 40px rgba(26,18,9,0.08);
    position: relative;
    overflow: hidden;
  }

  .word-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
  }

  .word-number {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .word-main {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .word-pronunciation {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }

  .pos-badge {
    display: inline-block;
    background: var(--ink);
    color: var(--parchment);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 20px;
  }

  .divider {
    height: 1px;
    background: var(--rule);
    margin-bottom: 20px;
  }

  .definition-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .definition-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--ink);
    line-height: 1.55;
    margin-bottom: 20px;
  }

  .example-block {
    background: var(--parchment);
    border-left: 3px solid var(--gold);
    padding: 14px 16px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 20px;
  }

  .example-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .example-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: #4a3e2e;
    line-height: 1.6;
  }

  .origin-block {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .origin-icon {
    font-size: 16px;
    margin-top: 1px;
  }

  .origin-content {}

  .origin-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 3px;
  }

  .origin-text {
    font-size: 13px;
    color: #6a5a48;
    line-height: 1.5;
  }

  /* Synonyms */
  .synonyms-section {
    padding: 20px 28px 0;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.3s;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 12px;
  }

  .synonym-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    background: white;
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 6px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 6px rgba(26,18,9,0.05);
  }

  .chip:active {
    background: var(--ink);
    color: var(--parchment);
    transform: scale(0.97);
  }

  /* Actions */
  .actions {
    padding: 20px 28px;
    display: flex;
    gap: 12px;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.4s;
  }

  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .btn-icon {
    font-size: 22px;
    line-height: 1;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--gold);
    box-shadow: 0 4px 16px rgba(26,18,9,0.2);
  }

  .btn-primary:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(26,18,9,0.2);
  }

  .btn-secondary {
    background: white;
    color: var(--ink);
    border: 1px solid var(--rule);
    box-shadow: 0 4px 16px rgba(26,18,9,0.05);
  }

  .btn-secondary:active {
    transform: scale(0.97);
    background: var(--parchment);
  }

  .btn-saved {
    background: var(--sage) !important;
    color: white !important;
  }

  /* Saved words */
  .saved-section {
    padding: 0 28px 40px;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.5s;
  }

  .saved-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .saved-toggle {
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--rust);
    cursor: pointer;
    text-transform: uppercase;
  }

  .saved-list {
    display: none;
    flex-direction: column;
    gap: 8px;
  }

  .saved-list.open {
    display: flex;
  }

  .saved-item {
    background: white;
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
  }

  .saved-word {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--ink);
    flex: 1;
  }

  .saved-def {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 180px;
  }

  .saved-remove {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    line-height: 1;
  }

  .empty-saved {
    text-align: center;
    padding: 20px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--muted);
  }

  /* Quiz modal */
  .quiz-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,18,9,0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .quiz-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  .quiz-sheet {
    width: 100%;
    max-width: 430px;
    background: var(--parchment);
    border-radius: 24px 24px 0 0;
    padding: 32px 28px 50px;
    animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .quiz-handle {
    width: 40px;
    height: 4px;
    background: var(--rule);
    border-radius: 2px;
    margin: 0 auto 24px;
  }

  .quiz-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .quiz-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .quiz-question {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 20px;
    padding: 18px;
    background: white;
    border-radius: 14px;
    border: 1px solid var(--rule);
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .quiz-option {
    background: white;
    border: 2px solid var(--rule);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .quiz-option:active { transform: scale(0.98); }
  .quiz-option.correct { border-color: var(--sage); background: #eef4f0; color: var(--sage); }
  .quiz-option.wrong { border-color: var(--rust); background: #fdf0ec; color: var(--rust); }

  .quiz-result {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    padding: 16px;
    border-radius: 12px;
    display: none;
  }

  .quiz-result.show { display: block; }
  .quiz-result.correct { background: #eef4f0; color: var(--sage); }
  .quiz-result.wrong { background: #fdf0ec; color: var(--rust); }

  .quiz-close {
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: var(--gold);
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    margin-top: 16px;
    letter-spacing: 0.05em;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  @keyframes flip {
    0% { transform: rotateY(0); }
    50% { transform: rotateY(90deg); }
    100% { transform: rotateY(0); }
  }

  .flipping {
    animation: flip 0.5s ease;
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <div class="masthead">Your Daily</div>
    <div class="logo">Le<em>x</em>icon</div>
    <div class="date-rule">
      <div class="line"></div>
      <div class="date-text" id="dateText">—</div>
      <div class="line"></div>
    </div>
  </div>

  <!-- Streak -->
  <div class="streak-bar">
    <div class="streak-flame">🔥</div>
    <div class="streak-info">
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-label">DAY STREAK</div>
    </div>
    <div class="streak-dots" id="streakDots"></div>
  </div>

  <!-- Word Card -->
  <div class="card-section">
    <div class="word-card" id="wordCard">
      <div class="word-number" id="wordNumber">WORD #001</div>
      <div class="word-main" id="wordMain">—</div>
      <div class="word-pronunciation" id="wordPron">—</div>
      <div class="pos-badge" id="posBadge">—</div>
      <div class="divider"></div>
      <div class="definition-label">DEFINITION</div>
      <div class="definition-text" id="wordDef">Loading your word for today…</div>
      <div class="example-block">
        <div class="example-label">Used in a sentence</div>
        <div class="example-text" id="wordEx">—</div>
      </div>
      <div class="origin-block">
        <div class="origin-icon">🏛️</div>
        <div class="origin-content">
          <div class="origin-label">Etymology</div>
          <div class="origin-text" id="wordOrigin">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Synonyms -->
  <div class="synonyms-section">
    <div class="section-title">Synonyms & Related</div>
    <div class="synonym-chips" id="synonymChips"></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="saveBtn" onclick="toggleSave()">
      <span class="btn-icon">🔖</span>
      Save Word
    </button>
    <button class="btn btn-secondary" onclick="openQuiz()">
      <span class="btn-icon">✏️</span>
      Quiz Me
    </button>
    <button class="btn btn-secondary" onclick="nextWord()">
      <span class="btn-icon">↻</span>
      New Word
    </button>
  </div>

  <!-- Saved Words -->
  <div class="saved-section">
    <div class="saved-header">
      <div class="section-title" style="margin:0">SAVED WORDS (<span id="savedCount">0</span>)</div>
      <button class="saved-toggle" onclick="toggleSavedList()">VIEW ALL</button>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>

</div>

<!-- Quiz Modal -->
<div class="quiz-overlay" id="quizOverlay" onclick="closeQuizOnBackdrop(event)">
  <div class="quiz-sheet">
    <div class="quiz-handle"></div>
    <div class="quiz-title">Quick Quiz</div>
    <div class="quiz-subtitle">Test your knowledge of today's word</div>
    <div class="quiz-question" id="quizQuestion">—</div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-result" id="quizResult"></div>
    <button class="quiz-close" onclick="closeQuiz()">Done</button>
  </div>
</div>

<script>
const words = [
  { word: "Serendipity", pronunciation: "/ˌser·ən·ˈdip·ə·tē/", pos: "noun", definition: "The occurrence of finding pleasant or valuable things by chance, especially while searching for something else entirely.", example: "It was pure serendipity that brought the two scientists together at that conference, leading to their groundbreaking discovery.", origin: "Coined by Horace Walpole in 1754, from the Persian fairy tale The Three Princes of Serendip (old name for Sri Lanka).", synonyms: ["Happenstance", "Fortune", "Providence", "Kismet", "Coincidence"] },
  { word: "Ephemeral", pronunciation: "/ɪˈfem·ər·əl/", pos: "adjective", definition: "Lasting for only a brief moment; transitory. Of things so short-lived as to seem fleeting and impermanent.", example: "Cherry blossoms are ephemeral by nature — their beauty lasting only a week before the petals scatter on the wind.", origin: "From Greek ephēmeros, meaning 'lasting a day,' from epi- (on) + hēmera (day).", synonyms: ["Transient", "Fleeting", "Momentary", "Transitory", "Fugacious"] },
  { word: "Sonder", pronunciation: "/ˈsän·dər/", pos: "noun", definition: "The profound realization that every passerby is living a life as vivid and complex as your own, complete with ambitions, struggles, and stories.", example: "Watching strangers hurry through the train station, she was overcome with sonder — each one carrying a world she'd never know.", origin: "Coined by John Koenig in The Dictionary of Obscure Sorrows (2012); modeled after the German sonder- prefix meaning 'particular.'", synonyms: ["Empathy", "Awareness", "Realization", "Recognition", "Weltanschauung"] },
  { word: "Mellifluous", pronunciation: "/məˈlif·lu·əs/", pos: "adjective", definition: "Pleasingly smooth and musical to the ear; flowing sweetly like honey — used especially of a voice or sound.", example: "The professor's mellifluous voice transformed even the most technical passages into something like poetry.", origin: "From Latin mellifluus, from mel (honey) + fluere (to flow). Literally 'flowing with honey.'", synonyms: ["Dulcet", "Euphonious", "Honeyed", "Silvery", "Sonorous"] },
  { word: "Hiraeth", pronunciation: "/ˈhɪr·aɪθ/", pos: "noun", definition: "A deep, bittersweet longing for a home, time, or person that can never be returned to — a homesickness tinged with grief for something lost or perhaps never fully possessed.", example: "She felt a wave of hiraeth looking through old photographs — not for a specific place, but for a feeling she couldn't quite name.", origin: "A Welsh word with no direct English equivalent. From hir (long, lasting) + aeth (grief, pain). Considered untranslatable.", synonyms: ["Nostalgia", "Longing", "Yearning", "Weltschmerz", "Saudade"] },
  { word: "Ineffable", pronunciation: "/ɪˈnef·ə·bəl/", pos: "adjective", definition: "Too great, extreme, or beautiful to be expressed or described in words; indescribable; unspeakable.", example: "Standing at the edge of the Grand Canyon at sunrise, he was struck by an ineffable sense of smallness and wonder.", origin: "From Latin ineffabilis, from in- (not) + effari (to speak out), from ex- (out) + fari (to speak).", synonyms: ["Indescribable", "Unspeakable", "Inexpressible", "Unutterable", "Transcendent"] },
  { word: "Petrichor", pronunciation: "/ˈpet·rɪ·kɔːr/", pos: "noun", definition: "The earthy, pleasant smell that accompanies the first rain falling on dry earth — one of the most universally beloved scents in the world.", example: "She opened the window to let in the petrichor, breathing deeply as the summer storm broke over the parched fields.", origin: "Coined in 1964 by Australian scientists Bear and Thomas, from Greek petra (stone) + ichor (the ethereal fluid in gods' veins).", synonyms: ["Geosmin", "Earthy scent", "Rain scent", "Wet earth smell"] },
  { word: "Limerence", pronunciation: "/ˈlɪm·ər·əns/", pos: "noun", definition: "An involuntary state of intense romantic infatuation characterized by obsessive thoughts about another person and a powerful desire for reciprocation.", example: "He recognized the signs of limerence — the constant replaying of conversations, the racing heart, the inability to focus on anything else.", origin: "Coined by psychologist Dorothy Tennov in 1979 in her book Love and Limerence.", synonyms: ["Infatuation", "Obsession", "Ardor", "Passion", "Fixation"] },
  { word: "Luminous", pronunciation: "/ˈluː·mɪ·nəs/", pos: "adjective", definition: "Emitting light, especially shining by reflected light; full of light, bright and radiant — also used to describe something intellectually enlightening.", example: "Her luminous eyes seemed to capture and reflect every light in the room, holding entire conversations without a single word.", origin: "From Latin luminosus, from lumen (light). Related to luna (moon) and illuminate.", synonyms: ["Radiant", "Incandescent", "Lustrous", "Brilliant", "Resplendent"] },
  { word: "Vellichor", pronunciation: "/ˈvel·ɪ·kɔːr/", pos: "noun", definition: "The strange wistfulness of used bookstores, somehow both cozy and melancholy — filled with thousands of stories that will never be read.", example: "She felt a familiar vellichor as she wandered the cramped aisles, running her fingers along spines no one else had touched in years.", origin: "Coined by John Koenig in The Dictionary of Obscure Sorrows. Modeled on 'velvet' and 'ichor,' evoking softness and age.", synonyms: ["Melancholy", "Wistfulness", "Nostalgia", "Longing", "Bittersweetness"] },
  { word: "Solipsism", pronunciation: "/ˈsɒl·ɪp·sɪz·əm/", pos: "noun", definition: "The philosophical theory that only one's own mind is certain to exist, and that the external world cannot be proven real.", example: "His solipsism made it impossible to truly empathize — every conversation circled back to how things affected him alone.", origin: "From Latin solus (alone) + ipse (self) + -ism. First appeared in 19th-century English philosophical writing.", synonyms: ["Self-absorption", "Egocentrism", "Narcissism", "Subjectivism"] },
  { word: "Palimpsest", pronunciation: "/ˈpæl·ɪmp·sest/", pos: "noun", definition: "A manuscript page that has been written on, erased, and used again — while traces of the earlier writing remain visible beneath.", example: "The old city was a palimpsest of civilizations, each era's architecture layered atop the ruins of what came before.", origin: "From Greek palimpsestos, from palin (again) + psestos (scraped). Used since the 17th century.", synonyms: ["Layering", "Overwriting", "Manuscript", "Trace", "Remnant"] },
  { word: "Apricity", pronunciation: "/əˈprɪs·ɪ·tee/", pos: "noun", definition: "The warmth of the sun in winter — that particular, precious quality of sunlight felt on a cold day when the air is sharp but the sun reaches through.", example: "She sat by the window, eyes closed, savoring the apricity on her face while frost still traced patterns on the glass outside.", origin: "From Latin apricus (warmed by the sun). Appeared in Henry Cockeram's English dictionary in 1623 but fell out of use.", synonyms: ["Warmth", "Sunshine", "Solar warmth", "Insolation"] },
  { word: "Liminal", pronunciation: "/ˈlɪm·ɪ·nəl/", pos: "adjective", definition: "Relating to a transitional or threshold state — occupying a position at or on both sides of a boundary, between two phases or conditions.", example: "The airport at 3 a.m. had a liminal quality — a place between departure and arrival, populated by people between one life and another.", origin: "From Latin limen (threshold). Popularized in anthropology by Victor Turner in studies of ritual transitions.", synonyms: ["Transitional", "Threshold", "In-between", "Intermediate", "Marginal"] },
  { word: "Quiddity", pronunciation: "/ˈkwɪd·ɪ·tee/", pos: "noun", definition: "The inherent nature or essence of a person or thing — the quality that makes something what it is, rather than something else.", example: "After years of study, the philosopher still struggled to articulate the quiddity of consciousness — what made awareness itself.", origin: "From medieval Latin quidditas, from Latin quid (what). Used by scholastic philosophers to translate Aristotle's concept of 'whatness.'", synonyms: ["Essence", "Nature", "Quintessence", "Substance", "Being"] },
  { word: "Tintinnabulation", pronunciation: "/ˌtɪn·tɪ·næb·jʊˈleɪ·ʃən/", pos: "noun", definition: "A ringing or tinkling sound, as of bells — the light, musical sound produced by small bells or anything resembling it.", example: "The tintinnabulation of wind chimes drifted through the open window, filling the quiet room with gentle, wavering music.", origin: "From Latin tintinnabulum (bell). Famously used by Edgar Allan Poe in his poem 'The Bells' (1849).", synonyms: ["Ringing", "Chiming", "Jingling", "Pealing", "Tinkling"] },
  { word: "Sempiternal", pronunciation: "/ˌsem·pɪˈtɜː·nəl/", pos: "adjective", definition: "Eternal and unchanging; everlasting — existing or continuing without end, especially in a way that feels ancient and immovable.", example: "The mountains gave her a sense of something sempiternal — indifferent to the brief flicker of human lives passing below.", origin: "From Latin semper (always) + aeternus (eternal). Used in theological writing to describe the timeless nature of the divine.", synonyms: ["Eternal", "Everlasting", "Perpetual", "Timeless", "Infinite"] },
  { word: "Syzygy", pronunciation: "/ˈsɪz·ɪ·dʒee/", pos: "noun", definition: "The alignment of three celestial bodies in a straight line, as in a solar or lunar eclipse — also used poetically to mean any perfect alignment.", example: "The ancient astronomers tracked each syzygy with reverence, believing the alignment of sun, moon, and earth carried divine significance.", origin: "From Greek syzygos (yoked together), from syn- (together) + zygon (yoke). Used in astronomy since the 17th century.", synonyms: ["Alignment", "Conjunction", "Opposition", "Eclipse", "Convergence"] },
  { word: "Crepuscular", pronunciation: "/krɪˈpʌs·kjʊ·lər/", pos: "adjective", definition: "Of, relating to, or resembling twilight — appearing or active during the dim half-light of dawn or dusk.", example: "Deer are crepuscular creatures, moving through the meadow in the violet hour between daylight and dark.", origin: "From Latin crepusculum (twilight), from creper (dusky, uncertain). Related to the mystery of the threshold between day and night.", synonyms: ["Twilight", "Dusky", "Dim", "Vespertine", "Shadowy"] },
  { word: "Numinous", pronunciation: "/ˈnjuː·mɪ·nəs/", pos: "adjective", definition: "Having a strong religious or spiritual quality; indicating the presence of a divinity — evoking a sense of the sublime and mysteriously holy.", example: "Standing inside the ancient cathedral, he felt something numinous — a presence that had nothing to do with the stone or the glass.", origin: "From Latin numen (divine will, spirit). Popularized by theologian Rudolf Otto in The Idea of the Holy (1917).", synonyms: ["Sacred", "Spiritual", "Transcendent", "Mystical", "Sublime"] },
  { word: "Iridescent", pronunciation: "/ˌɪr·ɪˈdes·ənt/", pos: "adjective", definition: "Showing luminous colors that seem to change when seen from different angles — producing a rainbow-like play of color through light interference.", example: "The hummingbird's throat was iridescent, shifting from emerald to ruby as it hovered, catching the morning light at every angle.", origin: "From Latin iris (rainbow) + -escent (becoming). Related to Iris, the Greek goddess of the rainbow.", synonyms: ["Opalescent", "Lustrous", "Shimmering", "Prismatic", "Nacreous"] },
  { word: "Ennui", pronunciation: "/ɒnˈwiː/", pos: "noun", definition: "A feeling of listlessness and dissatisfaction arising from a lack of occupation or excitement — a deep, world-weary boredom.", example: "After months of travel, he returned home only to be surprised by the familiar ennui — the sense that nothing, anywhere, was quite enough.", origin: "Borrowed directly from French, from Old French enui. Related to the Latin inodiare (to make hateful).", synonyms: ["Boredom", "Listlessness", "Tedium", "Apathy", "Languor"] },
  { word: "Susurrus", pronunciation: "/suːˈsɜː·rəs/", pos: "noun", definition: "A whispering or rustling sound — a soft, murmuring noise like wind through leaves or a crowd speaking in hushed voices.", example: "The susurrus of the library — pages turning, pencils scratching, breath drawn in quiet concentration — was itself a kind of music.", origin: "Directly from Latin susurrus (a murmur, hum, whisper). An onomatopoeic word that sounds like the thing it describes.", synonyms: ["Murmur", "Whisper", "Rustle", "Hush", "Sibilance"] },
  { word: "Fugacious", pronunciation: "/fjuːˈɡeɪ·ʃəs/", pos: "adjective", definition: "Tending to disappear quickly; fleeting and transient — used of things that are beautiful or pleasant precisely because of their brevity.", example: "Youth is fugacious, she wrote in her journal — and it is only in looking back that we understand what we were living through.", origin: "From Latin fugax (fleeting), from fugere (to flee). Related to fugitive and refuge. Used in English since the 17th century.", synonyms: ["Fleeting", "Transient", "Ephemeral", "Evanescent", "Impermanent"] },
  { word: "Diaphanous", pronunciation: "/daɪˈæf·ə·nəs/", pos: "adjective", definition: "Light, delicate, and translucent — so fine and thin as to be nearly transparent, like gauze or a veil caught in the light.", example: "The diaphanous curtains billowed inward on the sea breeze, filling the room with filtered light and the smell of salt.", origin: "From medieval Latin diaphanus, from Greek diaphanes (transparent), from dia- (through) + phainein (to show).", synonyms: ["Translucent", "Sheer", "Gossamer", "Filmy", "Gauzy"] },
  { word: "Lacuna", pronunciation: "/ləˈkjuː·nə/", pos: "noun", definition: "A gap or missing portion — especially in a manuscript, argument, or series of events; an unfilled space or interval.", example: "There was a troubling lacuna in his memory of that night — a blank space that no amount of effort could illuminate.", origin: "From Latin lacuna (pit, pool, hole), from lacus (lake). Used in scholarship since the 17th century for gaps in texts.", synonyms: ["Gap", "Void", "Hiatus", "Omission", "Absence"] },
  { word: "Halcyon", pronunciation: "/ˈhæl·si·ən/", pos: "adjective", definition: "Denoting a period of time in the past that was idyllically happy and peaceful; calm and carefree — golden and untroubled.", example: "They spoke of those halcyon summers before the war with a tenderness that made the present feel colorless by comparison.", origin: "From the halcyon bird (kingfisher) of Greek myth, believed to nest on the sea and calm the waves during winter solstice.", synonyms: ["Peaceful", "Golden", "Idyllic", "Serene", "Blissful"] },
  { word: "Nemophilist", pronunciation: "/nɪˈmɒf·ɪ·lɪst/", pos: "noun", definition: "A person who loves forests and finds solace, wonder, and belonging among the trees — a devotee of woodland and wild places.", example: "A lifelong nemophilist, she felt most herself in the deep woods, away from roads and noise and the demands of other people.", origin: "From Greek nemos (wooded grove) + philos (loving). A 19th-century coinage that captures something many people feel but rarely name.", synonyms: ["Forest lover", "Naturalist", "Sylvan devotee", "Wanderer"] },
  { word: "Psithurism", pronunciation: "/ˈsɪθ·jʊ·rɪz·əm/", pos: "noun", definition: "The sound of wind through trees — the particular whispering or rustling made by leaves stirred by a breeze.", example: "She fell asleep to the psithurism outside her window, the oak tree speaking softly in a language older than words.", origin: "From Greek psithuros (whispering), from psithyrizein (to whisper). A rare and beautiful word for one of nature's most soothing sounds.", synonyms: ["Rustling", "Whispering", "Murmur", "Susurrus", "Soughing"] },
  { word: "Fernweh", pronunciation: "/ˈfɛrn·veɪ/", pos: "noun", definition: "An aching longing for distant places; a deep craving for travel and the far-away — the opposite of homesickness.", example: "Every autumn, the fernweh became unbearable — a restlessness that only the sight of an unfamiliar horizon could soothe.", origin: "A German word: fern (far) + Weh (pain, ache). Often translated as 'farsickness' — the longing to be somewhere far away.", synonyms: ["Wanderlust", "Restlessness", "Yearning", "Longing"] },
  { word: "Sillage", pronunciation: "/siːˈjɑːʒ/", pos: "noun", definition: "The trail left in the air by a passing perfume — the invisible, lingering impression of a scent after its wearer has gone.", example: "Long after she left the room, her sillage remained — a trace of jasmine and cedar that made the space feel briefly inhabited.", origin: "From French sillage (wake of a ship), from sillon (furrow, track). Borrowed into English perfumery to describe a fragrance's projection.", synonyms: ["Trace", "Trail", "Impression", "Scent trail", "Wake"] },
  { word: "Coruscate", pronunciation: "/ˈkɒr·ə·skeɪt/", pos: "verb", definition: "To flash or sparkle with light; to emit vivid flashes — also used figuratively of wit or intelligence that dazzles.", example: "The diamonds coruscated under the chandelier, throwing tiny rainbows across the ceiling of the ballroom.", origin: "From Latin coruscare (to flash, glitter). Related to the shimmering lights associated with divine or celestial phenomena.", synonyms: ["Sparkle", "Glitter", "Flash", "Scintillate", "Gleam"] },
  { word: "Velleity", pronunciation: "/veˈliː·ɪ·tee/", pos: "noun", definition: "A very weak desire or wish; a mere inclination that does not lead to any action — the lowest degree of volition.", example: "He had a velleity to write a novel — the idea lingered pleasantly in his mind for years, entirely unaccompanied by effort.", origin: "From Latin velle (to wish). Introduced into English by philosopher John Locke in his Essay Concerning Human Understanding.", synonyms: ["Whim", "Inclination", "Wish", "Fantasy", "Half-desire"] },
  { word: "Eigengrau", pronunciation: "/ˈaɪ·ɡən·ɡraʊ/", pos: "noun", definition: "The dark grey color perceived by the human eye in perfect darkness — the intrinsic grey of vision itself, not true black.", example: "In the windowless room, she stared into eigengrau — not darkness exactly, but the soft, uniform grey the brain provides when there is nothing to see.", origin: "From German eigen (own, intrinsic) + grau (grey). A term from visual perception science describing the resting state of the visual field.", synonyms: ["Visual noise", "Dark grey", "Intrinsic grey"] },
  { word: "Kenopsia", pronunciation: "/kɛˈnɒp·si·ə/", pos: "noun", definition: "The eerie, unsettling atmosphere of a place that is usually busy but is now empty — the haunted quality of abandoned familiar spaces.", example: "Walking through the school after hours, she was gripped by kenopsia — the hallways felt wrong without the noise and bodies that usually filled them.", origin: "Coined by John Koenig in The Dictionary of Obscure Sorrows, from Greek kenos (empty) + opsis (sight).", synonyms: ["Emptiness", "Desolation", "Eeriness", "Vacancy", "Abandonment"] },
  { word: "Phosphene", pronunciation: "/ˈfɒs·fiːn/", pos: "noun", definition: "The sensation of seeing light — rings, spots, or colors — caused by pressure on the eye or stimulation of the visual cortex rather than actual light.", example: "Pressing her palms against her closed eyelids, she watched the phosphenes bloom and shift — a private light show behind the dark.", origin: "From Greek phos (light) + phainein (to show). First used in the 19th century to describe seeing light without external stimulus.", synonyms: ["Visual noise", "Light sensation", "Eye flash"] },
  { word: "Elegy", pronunciation: "/ˈel·ɪ·dʒee/", pos: "noun", definition: "A mournful, melancholic poem or song, typically written as a lament for someone who has died — or more broadly, anything expressing sorrow for loss.", example: "The last letter he ever wrote to her was, unknowingly, an elegy — full of the tenderness of someone sensing an ending.", origin: "From Latin elegia, from Greek elegeia. The elegy was one of the central forms of ancient Greek and Roman poetry.", synonyms: ["Lament", "Dirge", "Threnody", "Requiem", "Ode"] },
  { word: "Saudade", pronunciation: "/saʊˈdɑː·də/", pos: "noun", definition: "A deep emotional state of nostalgic longing for something absent — a bittersweet yearning for people, places, or times that are gone, perhaps forever.", example: "She carried a lifelong saudade for the village of her childhood — not wanting to return exactly, but unable to stop reaching toward it.", origin: "From Portuguese and Galician. Some trace it to Latin solitatem (solitude). Central to the musical tradition of fado.", synonyms: ["Longing", "Nostalgia", "Yearning", "Hiraeth", "Melancholy"] },
  { word: "Apophenia", pronunciation: "/ˌæp·əˈfiː·ni·ə/", pos: "noun", definition: "The tendency to perceive meaningful connections or patterns between unrelated things — seeing faces in clouds, or omens in coincidences.", example: "His apophenia turned every accident into a sign — every missed train, every wrong turn, into a message from the universe.", origin: "Coined by psychiatrist Klaus Conrad in 1958, from Greek apo- (away) + phaenein (to show). Originally described early symptoms of psychosis.", synonyms: ["Pattern recognition", "Pareidolia", "Magical thinking"] },
  { word: "Lacrimose", pronunciation: "/ˈlæk·rɪ·moʊs/", pos: "adjective", definition: "Tearful or given to weeping; inducing sadness or tears — prone to crying, or having the quality of causing others to cry.", example: "She was a lacrimose reader — any act of unexpected kindness in a novel was enough to make her reach for a tissue.", origin: "From Latin lacrimosus, from lacrima (tear). Related to the lacrimal glands that produce tears.", synonyms: ["Tearful", "Weepy", "Mournful", "Plaintive", "Doleful"] },
  { word: "Noctilucent", pronunciation: "/ˌnɒk·tɪˈluː·sənt/", pos: "adjective", definition: "Shining or glowing in the night — specifically used of the rare, electric-blue clouds visible at twilight at high altitudes.", example: "The noctilucent clouds appeared just after sunset — thin, rippling veils of blue-white light hovering at the edge of space.", origin: "From Latin nox/noctis (night) + lucere (to shine). Used in meteorology for the highest clouds in Earth's atmosphere.", synonyms: ["Luminous", "Phosphorescent", "Glowing", "Radiant"] },
  { word: "Ultracrepidarian", pronunciation: "/ˌʌl·trə·krep·ɪˈdeɪ·ri·ən/", pos: "noun", definition: "A person who gives opinions and advice on matters beyond their knowledge — someone who speaks with authority about things they do not understand.", example: "The dinner party had its resident ultracrepidarian — a man with confident opinions on surgery, astrophysics, and ancient history, despite knowing nothing of any.", origin: "From Latin ultra (beyond) + crepida (sandal). From the story of the painter Apelles, who told a cobbler to stick to judging shoes, not art.", synonyms: ["Know-it-all", "Blowhard", "Dilettante", "Pontificator"] },
  { word: "Ataraxia", pronunciation: "/ˌæt·əˈræk·si·ə/", pos: "noun", definition: "A state of serene calmness and composure, especially in difficult situations — freedom from anxiety, disturbance, and mental suffering.", example: "The monk moved through the chaos of the marketplace with perfect ataraxia — untouched, unhurried, at peace with what he could not change.", origin: "From Greek ataraxia, from a- (not) + taraxia (disturbance). The Epicureans and Stoics regarded ataraxia as the highest human goal.", synonyms: ["Serenity", "Equanimity", "Tranquility", "Composure", "Peace"] },
  { word: "Elysian", pronunciation: "/ɪˈlɪʒ·ən/", pos: "adjective", definition: "Relating to or characteristic of Elysium, the paradise of Greek mythology — used to describe any place or experience of perfect bliss and beauty.", example: "The valley that morning had an elysian quality — bathed in golden light, impossibly still, as if the world had been briefly perfected.", origin: "From Latin Elysium, from Greek Elysion, the plain where heroes lived after death. One of the oldest images of paradise.", synonyms: ["Blissful", "Heavenly", "Paradisiacal", "Idyllic", "Sublime"] },
  { word: "Sempiternal", pronunciation: "/ˌsem·pɪˈtɜː·nəl/", pos: "adjective", definition: "Eternal and unchanging; everlasting — existing without end, especially in a way that feels ancient and immovable.", example: "The mountains gave her a sense of something sempiternal — indifferent to the brief flicker of human lives passing below.", origin: "From Latin semper (always) + aeternus (eternal). Used in theological writing to describe the timeless nature of the divine.", synonyms: ["Eternal", "Everlasting", "Perpetual", "Timeless", "Infinite"] },
  { word: "Oubliette", pronunciation: "/ˌuː·bli·ˈet/", pos: "noun", definition: "A secret dungeon with an opening only at the top — used in medieval castles to imprison those meant to be forgotten.", example: "The castle tour guide paused at the oubliette, explaining that prisoners were lowered in and simply left.", origin: "From French oublier (to forget), from Latin oblivisci. Literally 'a place of forgetting.' Used since the 18th century in English.", synonyms: ["Dungeon", "Pit", "Cell", "Prison", "Vault"] },
  { word: "Tarantism", pronunciation: "/ˈtær·ən·tɪz·əm/", pos: "noun", definition: "An irresistible urge to dance — historically, a hysteria epidemic in southern Italy believed to be caused by a tarantula bite, cured only by frenzied dancing.", example: "When the band finally struck up, something like tarantism seized the crowd — no one could hold still, and no one wanted to.", origin: "From Taranto, a city in southern Italy, where outbreaks of dancing mania were recorded in the 15th–17th centuries.", synonyms: ["Dancing mania", "Frenzy", "Ecstasy", "Compulsion"] },
  { word: "Clinomania", pronunciation: "/ˌklaɪ·nəˈmeɪ·ni·ə/", pos: "noun", definition: "An excessive desire to stay in bed — an overwhelming urge to remain horizontal and avoid the demands of the waking world.", example: "Monday mornings brought on her clinomania with full force — the bed seemed to argue, persuasively, that the world could wait.", origin: "From Greek klinein (to lean, recline) + mania (madness, obsession). A modern coinage combining classical roots.", synonyms: ["Drowsiness", "Lethargy", "Torpor", "Sluggishness"] },
  { word: "Vesperal", pronunciation: "/ˈves·pər·əl/", pos: "adjective", definition: "Of, relating to, or occurring in the evening — belonging to the quiet, golden hour before night fully settles in.", example: "There was a vesperal hush over the city as the last commuters disappeared and the streetlights began to flicker on.", origin: "From Latin vesper (evening, evening star). Related to vespers, the evening prayer service of the Catholic church.", synonyms: ["Evening", "Twilight", "Crepuscular", "Dusky"] },
  { word: "Oscitancy", pronunciation: "/ˈɒs·ɪ·tən·si/", pos: "noun", definition: "The state of being drowsy and dull; a tendency to yawn — sluggishness of mind or body, inattentiveness born of fatigue or boredom.", example: "A wave of oscitancy overtook the lecture hall after lunch, and even the professor seemed to be fighting the pull of sleep.", origin: "From Latin oscitare (to gape, yawn), from os (mouth) + citare (to move). A rare but wonderfully specific word.", synonyms: ["Drowsiness", "Lethargy", "Torpor", "Sluggishness"] },
  { word: "Bathetic", pronunciation: "/bəˈθet·ɪk/", pos: "adjective", definition: "Producing an effect of bathos — an abrupt, disappointing transition from the elevated to the commonplace; absurdly anticlimactic.", example: "The film's ending was bathetic: after two hours of grand tragedy, the hero simply got on a bus and went home.", origin: "From bathos, from Greek bathos (depth) — used ironically for a sudden descent in writing from the lofty to the trivial.", synonyms: ["Anticlimactic", "Maudlin", "Trite", "Deflating"] },
  { word: "Quixotic", pronunciation: "/kwɪkˈsɒt·ɪk/", pos: "adjective", definition: "Exceedingly idealistic and impractical; romantic to the point of absurdity — pursuing lofty, unreachable goals with passionate sincerity.", example: "Her quixotic plan to sail solo around the world before age 25 was laughed at by everyone, which only strengthened her resolve.", origin: "From Don Quixote, the hero of Cervantes' 1605 novel who famously tilted at windmills, mistaking them for giants.", synonyms: ["Idealistic", "Impractical", "Romantic", "Visionary", "Unrealistic"] },
  { word: "Lassitude", pronunciation: "/ˈlæs·ɪ·tjuːd/", pos: "noun", definition: "Physical or mental weariness; a state of fatigue and listlessness that saps the will and makes even small efforts feel immense.", example: "A deep lassitude settled over him after the diagnosis — not sadness exactly, but a heaviness that made rising from bed feel like climbing a mountain.", origin: "From Latin lassitudo, from lassus (weary). Related to the Spanish laso and the concept of exhaustion beyond simple tiredness.", synonyms: ["Fatigue", "Lethargy", "Weariness", "Torpor", "Languor"] }

let currentWordIndex = 0;
let savedWords = JSON.parse(localStorage.getItem('lexicon_saved') || '[]');
let streak = parseInt(localStorage.getItem('lexicon_streak') || '0');
let lastVisit = localStorage.getItem('lexicon_lastVisit') || '';
let savedListOpen = false;

function init() {
  // Update date
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateText').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

  // Update streak
  const today = now.toDateString();
  if (lastVisit !== today) {
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    if (lastVisit === yesterday.toDateString()) {
      streak++;
    } else if (lastVisit !== today) {
      streak = 1;
    }
    localStorage.setItem('lexicon_streak', streak);
    localStorage.setItem('lexicon_lastVisit', today);
  }

  // Use day-of-year to pick daily word
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const dayOfYear = Math.floor(diff / (1000*60*60*24));
  currentWordIndex = dayOfYear % words.length;

  renderStreak();
  renderWord(currentWordIndex);
  renderSavedWords();
}

function renderStreak() {
  document.getElementById('streakNum').textContent = streak;
  const dots = document.getElementById('streakDots');
  dots.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < Math.min(streak, 7) ? ' filled' : '');
    dots.appendChild(d);
  }
}

function renderWord(idx) {
  const w = words[idx];
  document.getElementById('wordNumber').textContent = `WORD #${String(idx+1).padStart(3,'0')}`;
  document.getElementById('wordMain').textContent = w.word;
  document.getElementById('wordPron').textContent = w.pronunciation;
  document.getElementById('posBadge').textContent = w.pos;
  document.getElementById('wordDef').textContent = w.definition;
  document.getElementById('wordEx').textContent = w.example;
  document.getElementById('wordOrigin').textContent = w.origin;

  const chips = document.getElementById('synonymChips');
  chips.innerHTML = '';
  w.synonyms.forEach(s => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = s;
    chips.appendChild(chip);
  });

  // Update save button
  const isSaved = savedWords.some(sw => sw.word === w.word);
  const btn = document.getElementById('saveBtn');
  btn.className = 'btn btn-primary' + (isSaved ? ' btn-saved' : '');
  btn.innerHTML = `<span class="btn-icon">${isSaved ? '✓' : '🔖'}</span>${isSaved ? 'Saved!' : 'Save Word'}`;
}

function nextWord() {
  const card = document.getElementById('wordCard');
  card.classList.add('flipping');
  setTimeout(() => {
    currentWordIndex = (currentWordIndex + 1) % words.length;
    renderWord(currentWordIndex);
    card.classList.remove('flipping');
  }, 250);
}

function toggleSave() {
  const w = words[currentWordIndex];
  const idx = savedWords.findIndex(sw => sw.word === w.word);
  if (idx === -1) {
    savedWords.push({ word: w.word, definition: w.definition.substring(0, 50) + '…' });
  } else {
    savedWords.splice(idx, 1);
  }
  localStorage.setItem('lexicon_saved', JSON.stringify(savedWords));
  renderWord(currentWordIndex);
  renderSavedWords();
}

function renderSavedWords() {
  document.getElementById('savedCount').textContent = savedWords.length;
  const list = document.getElementById('savedList');
  if (savedWords.length === 0) {
    list.innerHTML = '<div class="empty-saved">No words saved yet — start building your collection.</div>';
    return;
  }
  list.innerHTML = '';
  savedWords.forEach((sw, i) => {
    const item = document.createElement('div');
    item.className = 'saved-item';
    item.style.animationDelay = `${i * 0.05}s`;
    item.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="saved-word">${sw.word}</div>
        <div class="saved-def">${sw.definition}</div>
      </div>
      <button class="saved-remove" onclick="removeSaved(${i})">×</button>
    `;
    list.appendChild(item);
  });
}

function removeSaved(i) {
  savedWords.splice(i, 1);
  localStorage.setItem('lexicon_saved', JSON.stringify(savedWords));
  renderSavedWords();
  renderWord(currentWordIndex);
}

function toggleSavedList() {
  savedListOpen = !savedListOpen;
  document.getElementById('savedList').classList.toggle('open', savedListOpen);
  document.querySelector('.saved-toggle').textContent = savedListOpen ? 'HIDE' : 'VIEW ALL';
}

function openQuiz() {
  const w = words[currentWordIndex];
  // Build question
  document.getElementById('quizQuestion').textContent = `What does "${w.word}" mean?`;

  // Build options: correct + 3 random decoys
  const correct = w.definition.split(';')[0].split('—')[0].trim();
  const shuffled = [...decoys].sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [...shuffled, correct].sort(() => Math.random() - 0.5);

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt, correct, btn);
    container.appendChild(btn);
  });

  document.getElementById('quizResult').className = 'quiz-result';
  document.getElementById('quizOverlay').classList.add('open');
}

function checkAnswer(chosen, correct, btn) {
  const allBtns = document.querySelectorAll('.quiz-option');
  allBtns.forEach(b => {
    b.onclick = null;
    if (b.textContent === correct) b.classList.add('correct');
    else if (b === btn && chosen !== correct) b.classList.add('wrong');
  });

  const result = document.getElementById('quizResult');
  result.classList.add('show');
  if (chosen === correct) {
    result.textContent = '✓ Correct! Excellent work.';
    result.className = 'quiz-result show correct';
  } else {
    result.textContent = '✗ Not quite — review the definition above.';
    result.className = 'quiz-result show wrong';
  }
}

function closeQuiz() {
  document.getElementById('quizOverlay').classList.remove('open');
}

function closeQuizOnBackdrop(e) {
  if (e.target === document.getElementById('quizOverlay')) closeQuiz();
}

init();
</script>
</body>
</html>
